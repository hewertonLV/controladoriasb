services:
  controladoriasb:
    build: .
    image: controladoriasb-app:latest
    restart: unless-stopped
    environment:
      TZ: America/Sao_Paulo
    ports:
      - '${APP_PORT:-44432}:80'
    volumes:
      - ./:/var/www/html
      - ./docker/php/conf.d/99-uploads.ini:/usr/local/etc/php/conf.d/99-uploads.ini:ro
    networks:
      - controladoriasb-network
    depends_on:
      mysql:
        condition: service_healthy

  # ------------------------------------------------------------------
  # Worker dedicado para importações em planilha.
  # Separado da exportação PDF para que processos pesados não bloqueiem
  # filas entre si.
  # ------------------------------------------------------------------
  worker-importacao:
    build: .
    image: controladoriasb-app:latest
    restart: unless-stopped
    user: www-data
    environment:
      TZ: America/Sao_Paulo
    # Formato em lista (exec): `php` vira PID 1 — SIGTERM do Docker chega direto ao
    # artisan queue:work (evita shell intermediário atrasando encerramento).
    # `--timeout=900` é intencional: previews Excel/PDF podem exceder 120s; reduzir
    # quebra importação/exportação (ver §12 / README).
    command:
      - php
      - artisan
      - queue:work
      - --queue=imports,empresas-importacao,unidades-negocio-importacao,clientes-importacao,grupos-importacao,veiculos-importacao,fretes-importacao,frutas-importacao,pracas-importacao,estoques-importacao,transferencias-importacao,estados-importacao
      - --sleep=1
      - --tries=1
      - --timeout=900
      - --max-time=3600
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - ./docker/php/conf.d/99-uploads.ini:/usr/local/etc/php/conf.d/99-uploads.ini:ro
    networks:
      - controladoriasb-network
    depends_on:
      mysql:
        condition: service_healthy
      controladoriasb:
        condition: service_started
    stop_signal: SIGTERM
    # Teto após SIGTERM: deve ser ≥ `--timeout` do worker para job longo terminar com segurança.
    stop_grace_period: 930s

  # ------------------------------------------------------------------
  # Worker dedicado para exportações PDF.
  # PDFs grandes consomem CPU/memória; manter fila isolada evita que
  # relatórios bloqueiem importações de Empresas.
  # ------------------------------------------------------------------
  # ------------------------------------------------------------------
  # Agendador Laravel (backup diário do MySQL às 01:00, filas, etc.)
  # ------------------------------------------------------------------
  scheduler:
    build: .
    image: controladoriasb-app:latest
    restart: unless-stopped
    user: www-data
    environment:
      TZ: America/Sao_Paulo
    command:
      - php
      - artisan
      - schedule:work
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - ./docker/php/conf.d/99-uploads.ini:/usr/local/etc/php/conf.d/99-uploads.ini:ro
    networks:
      - controladoriasb-network
    depends_on:
      mysql:
        condition: service_healthy
      controladoriasb:
        condition: service_started

  worker-exportacao:
    build: .
    image: controladoriasb-app:latest
    restart: unless-stopped
    user: www-data
    environment:
      TZ: America/Sao_Paulo
    command:
      - php
      - artisan
      - queue:work
      - --queue=empresas-exportacao,fornecedores-exportacao,clientes-exportacao,grupos-exportacao,unidades-negocio-exportacao,veiculos-exportacao,fretes-exportacao,frutas-exportacao,pracas-exportacao,estoques-exportacao
      - --sleep=1
      - --tries=1
      - --timeout=900
      - --max-time=3600
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - ./docker/php/conf.d/99-uploads.ini:/usr/local/etc/php/conf.d/99-uploads.ini:ro
    networks:
      - controladoriasb-network
    depends_on:
      mysql:
        condition: service_healthy
      controladoriasb:
        condition: service_started
    stop_signal: SIGTERM
    stop_grace_period: 930s

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    command: --default-time-zone=-03:00
    ports:
      - '${MYSQL_PORT:-44433}:3306'
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_DATABASE:-controladoriasb}
    volumes:
      - controladoriasb_mysql_data:/var/lib/mysql
    networks:
      - controladoriasb-network
    healthcheck:
      test: ['CMD-SHELL', 'mysqladmin ping -h 127.0.0.1 -uroot -p"$$MYSQL_ROOT_PASSWORD" --silent']
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    restart: unless-stopped
    ports:
      - '${PHPMYADMIN_PORT:-44434}:80'
    environment:
      PMA_HOST: mysql
      UPLOAD_LIMIT: 50M
    networks:
      - controladoriasb-network
    depends_on:
      mysql:
        condition: service_healthy

networks:
  controladoriasb-network:
    driver: bridge

volumes:
  controladoriasb_mysql_data:
